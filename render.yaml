# Render Blueprint — one-click deploy of the FastAPI backend + Postgres.
#
# Usage:
#   1. Sign in to https://render.com (free, GitHub OAuth)
#   2. New + → Blueprint → connect Jzineldin/Test → pick this branch
#   3. Render reads this file, creates the web service + the database,
#      and runs the build/start commands automatically.
#   4. After deploy, set the secret env vars in the Render dashboard
#      (AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY, CORS_ORIGINS).
#   5. Copy the *.onrender.com URL — that's your API base.
#
# Free-tier notes:
#   * Web service sleeps after 15 min idle; first request after sleep
#     takes ~30 s to wake the container. Fine for piloting.
#   * Postgres free tier is good for ~90 days (Render's policy at
#     time of writing). After that either pay $7/mo or migrate to
#     Neon (export DATABASE_URL, that's it — the schema travels via
#     `alembic upgrade head` on first boot of the new DB).

services:
  - type: web
    name: submission-triage-api
    runtime: python
    plan: free
    region: oregon          # closest free Bedrock region for us-west-2 users; pick virginia if you went us-east-1
    rootDir: api
    buildCommand: pip install -r requirements.txt
    # alembic upgrade head is idempotent — runs every cold start, no-op
    # when already at head. Keeps deploys safe across schema changes.
    startCommand: alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: DATABASE_URL
        fromDatabase:
          name: triage-db
          property: connectionString
      # Secrets — set these in the Render dashboard, NOT here.
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      # Wide-open default for CORS until you know your Vercel URL.
      # Tighten to your specific origin after the dashboard is deployed.
      - key: CORS_ORIGINS
        value: "*"
      - key: AWS_REGION
        value: us-east-1
      - key: BEDROCK_MODEL_ID
        value: us.anthropic.claude-sonnet-4-6
      # Set DASHBOARD_URL to your Vercel URL once known so magic-link
      # emails point to the right place. Defaults to localhost.
      - key: DASHBOARD_URL
        sync: false

databases:
  - name: triage-db
    plan: free
    databaseName: triage
    user: triage
